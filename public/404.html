<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Darbe</title>
    <script>
      // GitHub Pages SPA fallback: redirect unknown routes back to index.html
      // while preserving the path so the client router can restore it.
      (function () {
        var l = window.location;
        var pathSegmentsToKeep = 1; // Repo name segment, e.g. "/Darbe/"

        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname
              .split('/')
              .slice(0, 1 + pathSegmentsToKeep)
              .join('/') +
            '/?/' +
            l.pathname
              .slice(1)
              .split('/')
              .slice(pathSegmentsToKeep)
              .join('/') +
            l.search.replace(/&/g, '~and~') +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
